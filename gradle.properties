org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8 -XX:+UseG1GC
org.gradle.parallel=true
org.gradle.caching=true
# Configuration cache off for now — AGP 8.7.3 + JDK 17 trips a serializer
# bug on `MapSourceSetPathsTask`. Re-enable when we upgrade to AGP 8.11+.
org.gradle.configuration-cache=false

android.useAndroidX=true
android.nonTransitiveRClass=true
android.defaults.buildfeatures.buildconfig=true
android.nonFinalResIds=true
# AGP 8.7.3 was officially tested up to compileSdk 35; compileSdk 36
# works in practice but emits a warning. Suppress until we upgrade AGP.
android.suppressUnsupportedCompileSdk=36

kotlin.code.style=official
